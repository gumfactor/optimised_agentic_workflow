name: Proactive Hygiene

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: proactive-hygiene
  cancel-in-progress: false

jobs:
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install --global markdownlint-cli

      - name: Run proactive hygiene script
        run: bash scripts/proactive-hygiene.sh

      - name: Commit and push hygiene fixes
        run: |
          if git diff --quiet; then
            echo "No hygiene changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(hygiene): proactive automated maintenance pass"
          git push
